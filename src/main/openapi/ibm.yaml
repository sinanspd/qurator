      operationId: find_instance_workloads
      parameters:
        - name: user
          required: false
          in: query
          description: User identifier. For now it can only be "me".
          schema:
            example: me
            enum:
              - me
            type: string
        - name: sort
          required: false
          in: query
          description: Field to sort the workloads by. A `-` prefix indicates descending sort order.
          schema:
            default: createdAt
            enum:
              - createdAt
              - '-createdAt'
            type: string
        - name: limit
          required: false
          in: query
          description: Number of workloads to return at a time
          schema:
            minimum: 1
            maximum: 50
            default: 10
            example: 5
            type: number
        - name: previous
          required: false
          in: query
          description: Cursor to previous workloads result page
          schema:
            type: string
        - name: next
          required: false
          in: query
          description: Cursor to next workloads result page
          schema:
            type: string
        - name: backend
          required: false
          in: query
          description: Backend name
          schema:
            example: ibm_seattle
            type: string
        - name: search
          required: false
          in: query
          description: Optional search string, used to filter workloads by id or tags
          schema:
            example: test
            type: string
        - name: status
          required: false
          in: query
          description: Status type to filter workloads by. It can be pending, in_progress, failed, completed or canceled.
          schema:
            example:
              - pending
            type: array
            items:
              type: string
              enum:
                - completed
                - canceled
                - failed
                - pending
                - in_progress
