      security:
        - IBMCloudAPIKey: []
        - ServiceCRN: []
        - IBMCloudAuth: []
      x-ibm-events:
        events:
          - name: quantum-computing.device.read
      x-ibm-permissions:
        actions:
          - name: quantum-computing.device.read
    parameters:
      - in: header
        name: IBM-API-Version
        required: false
        schema:
          type: string
          default: '2025-05-01'
