                      type: object
                      properties:
                        id:
                          type: string
                          description: Workload id (job and session id)
                          example: ch8b1ok4k9li68vm059r
                        created:
                          type: string
                          description: Creation date
                          example: '2024-07-04T16:13:56.562Z'
                        ended:
                          type: string
                          description: End date
                          example: '2024-07-04T16:13:56.562Z'
                        backend:
