openapi: 3.0.0
paths:
  /v1/versions:
    get:
      description: Get a list of available API versions
      operationId: get_versions
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
      summary: Get versions
      tags:
        - Versions
  /v1/jobs:
    get:
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            default: 200
            minimum: 1
            maximum: 200
          description: Number of results to return at a time. If the provided value is outside of the viable range, no error occurs and the default value is used instead.
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
            maximum: 2147483647
          description: Number of results to offset when retrieving the list of jobs. If the provided value is outside of the viable range, no error occurs and the default value is used instead.
        - in: query
          name: pending
          required: false
          schema:
            type: boolean
          description: Returns 'Queued' and 'Running' jobs if true.  Returns 'Completed', 'Cancelled', and 'Failed' jobs if false.
        - in: query
          name: program
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 63
            pattern: ^.*$
          description: Program ID to filter jobs
        - in: query
          name: backend
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 100
            pattern: ^.*$
          description: Backend to filter jobs
        - in: query
          name: created_after
          required: false
          schema:
            type: string
            format: date-time
            minLength: 1
            maxLength: 100
          description: Job created after filter
        - in: query
          name: created_before
          required: false
          schema:
            type: string
            format: date-time
            minLength: 1
            maxLength: 100
          description: Job created before filter
        - in: query
          name: sort
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 4
            pattern: ^(ASC|DESC)$
          description: Sort jobs by created time ASC or DESC (default)
        - in: query
          name: tags
          required: false
          schema:
            title: Tags
            description: List of job or program tags
            type: array
            minItems: 1
            maxItems: 5
            items:
              type: string
              pattern: ^.*$
              minLength: 1
              maxLength: 24
          description: Tags to filter jobs
        - in: query
          name: session_id
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 1000
            pattern: ^.*$
          description: Session ID to filter jobs
        - in: query
          name: exclude_params
          required: false
          schema:
            type: boolean
            default: true
          description: Exclude job params from the response
      tags:
        - Jobs
      summary: List jobs
      operationId: list_jobs
      description: List the quantum program jobs you have run.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                title: JobsResponse
                type: object
                description: Jobs collection response
                properties:
                  jobs:
                    description: A list of jobs
                    type: array
                    items:
                      title: JobResponse
                      type: object
                      description: A job
                      properties:
                        id:
                          type: string
                          description: Identifier assigned to the job
                        backend:
                          type: string
                          description: |
                            &ast;&ast;Warning:&ast;&ast; While this parameter is not currently required for requests, specifying it is strongly encouraged. Running an ISA circuit on a backend that has a different instruction set will result in an error. The backend parameter will be required in a future release.

                            The backend on which to run the program.  If no backend is specified, the job is sent to the backend with the shortest queue that you have access to.
                          pattern: ^.*$
                        state:
                          title: JobState
                          type: object
                          description: Current state of the job
                          properties:
                            status:
                              type: string
                              description: Current status of the job
                              enum:
                                - Queued
                                - Running
                                - Completed
                                - Cancelled
                                - Failed
                            reason:
                              type: string
                              description: Reason for the current status
                            reason_code:
                              type: integer
                              format: int32
                              minimum: 1000
                              maximum: 9999
                              description: Reason code for the current status
                            reason_solution:
                              type: string
                              description: Next steps user can take in case of failure
                          required:
                            - status
                        status:
                          title: JobStatus
                          type: string
                          description: Current status of the job
                          enum:
                            - Queued
                            - Running
                            - Completed
                            - Cancelled
                            - Cancelled - Ran too long
                            - Failed
                        params:
                          type: object
                          additionalProperties: true
                          description: Parameters used to execute the job
                        program:
                          type: object
                          description: Program associated with the job
                          properties:
                            id:
                              type: string
                              description: Identifier from the executed program
                          required:
                            - id
                        created:
                          type: string
                          description: UTC timestamp for when the job was created
                        runtime:
                          type: string
                          description: Name and tag of the image to use when running a program (IBM Quantum channel users only)
                        cost:
                          type: integer
                          format: int32
                          minimum: 0
                          maximum: 10800
                          description: Cost of the job as the estimated time it should take to complete (in seconds). Should not exceed the cost of the program. If the provided value exceeds the maximum, it will be capped at that value.
                        tags:
                          title: Tags
                          description: List of job or program tags
                          type: array
                          minItems: 1
                          maxItems: 5
                          items:
                            type: string
                            pattern: ^.*$
                            minLength: 1
                            maxLength: 24
                        remote_storage:
                          allOf:
                            - allOf:
                                - oneOf:
                                    - type: object
                                      description: Remote storage metadata for where data is stored or to be stored in an IBM Cloud Object Storage bucket. Required fields may be omitted in field specific objected if allowed and defined in the default remote storage option.
                                      properties:
                                        type:
                                          type: string
                                          enum:
                                            - ibmcloud_cos
                                          default: ibmcloud_cos
                                        region:
                                          type: string
                                          example: us-east
                                          description: Region, Cross-Region, or Single Data Center as defined by IBM Cloud Object Storage (https://cloud.ibm.com/docs/cloud-object-storage?topic=cloud-object-storage-endpoints)
                                          pattern: ^[a-zA-Z-]+$
                                        region_type:
                                          type: string
                                          enum:
                                            - regional
                                            - cross-region
                                            - single-site
                                        bucket_crn:
                                          description: Fully specified <a href="https://cloud.ibm.com/docs/account?topic=account-crn">CRN</a> for the target Cloud Object Storage bucket
                                          type: string
                                          example: crn:v1:bluemix:public:cloud-object-storage:global:a/abc123:abc123:bucket:my-bucket
                                        object_name:
                                          description: Name/ID of the object in the IBM Cloud Object Storage bucket. May *not* be specified in the default remote storage option.
                                          type: string
                                      required:
                                        - object_name
                                        - bucket_crn
                                        - region
                                        - region_type
                                  discriminator:
                                    propertyName: type
                                - description: Default remote storage option for where input data is stored and where output data should be stored
                            - title: RemoteStorage
                              description: |
                                (Only enabled for Qiskit Runtime instances with the Channel Partner plan) Metadata and connection information on where job params are stored remotely
                                and/or where to store results, logs, transpiled circuits, etc. Omitted properties
                                in field specific objects will be inherited from the default remote storage option.
                                As an example, the following two objects are equivalent:

                                ```
                                {
                                    "type": "ibmcloud_cos",
                                    "region": "us-east",
                                    "region_type": "regional",
                                    "bucket_crn": "crn",
                                    "job_params": {
                                      "object_name": "my-object"
                                    }
                                }
                                ```

                                ```
                                {
                                    "type": "ibmcloud_cos",
                                    "region": "us-east",
                                    "region_type": "regional",
                                    "bucket_crn": "crn",
                                    "job_params": {
                                      "type": "ibmcloud_cos",
                                      "region": "us-east",
                                      "region_type": "regional",
                                      "bucket_crn": "crn",
                                      "object_name": "my-object"
                                    }
                                }
                                ```
                              properties:
                                job_params:
                                  allOf:
                                    - oneOf:
                                        - type: object
                                          description: Remote storage metadata for where data is stored or to be stored in an IBM Cloud Object Storage bucket. Required fields may be omitted in field specific objected if allowed and defined in the default remote storage option.
                                          properties:
                                            type:
                                              type: string
                                              enum:
                                                - ibmcloud_cos
                                              default: ibmcloud_cos
                                            region:
                                              type: string
                                              example: us-east
                                              description: Region, Cross-Region, or Single Data Center as defined by IBM Cloud Object Storage (https://cloud.ibm.com/docs/cloud-object-storage?topic=cloud-object-storage-endpoints)
                                              pattern: ^[a-zA-Z-]+$
                                            region_type:
                                              type: string
                                              enum:
                                                - regional
                                                - cross-region
                                                - single-site
                                            bucket_crn:
                                              description: Fully specified <a href="https://cloud.ibm.com/docs/account?topic=account-crn">CRN</a> for the target Cloud Object Storage bucket
                                              type: string
                                              example: crn:v1:bluemix:public:cloud-object-storage:global:a/abc123:abc123:bucket:my-bucket
                                            object_name:
                                              description: Name/ID of the object in the IBM Cloud Object Storage bucket. May *not* be specified in the default remote storage option.
                                              type: string
                                          required:
                                            - object_name
                                            - bucket_crn
                                            - region
                                            - region_type
                                      discriminator:
                                        propertyName: type
                                    - description: Location for where user supplied job params (omitted properties will will be inherited from default remote storage option)
                                results:
                                  allOf:
                                    - oneOf:
                                        - type: object
                                          description: Remote storage metadata for where data is stored or to be stored in an IBM Cloud Object Storage bucket. Required fields may be omitted in field specific objected if allowed and defined in the default remote storage option.
                                          properties:
                                            type:
                                              type: string
                                              enum:
                                                - ibmcloud_cos
                                              default: ibmcloud_cos
                                            region:
                                              type: string
                                              example: us-east
                                              description: Region, Cross-Region, or Single Data Center as defined by IBM Cloud Object Storage (https://cloud.ibm.com/docs/cloud-object-storage?topic=cloud-object-storage-endpoints)
                                              pattern: ^[a-zA-Z-]+$
                                            region_type:
                                              type: string
                                              enum:
                                                - regional
                                                - cross-region
                                                - single-site
                                            bucket_crn:
                                              description: Fully specified <a href="https://cloud.ibm.com/docs/account?topic=account-crn">CRN</a> for the target Cloud Object Storage bucket
                                              type: string
                                              example: crn:v1:bluemix:public:cloud-object-storage:global:a/abc123:abc123:bucket:my-bucket
                                            object_name:
                                              description: Name/ID of the object in the IBM Cloud Object Storage bucket. May *not* be specified in the default remote storage option.
                                              type: string
                                          required:
                                            - object_name
                                            - bucket_crn
                                            - region
                                            - region_type
                                      discriminator:
                                        propertyName: type
                                    - description: Location for where job results will be stored (omitted properties will will be inherited from default remote storage option)
                                logs:
                                  allOf:
                                    - oneOf:
                                        - type: object
                                          description: Remote storage metadata for where data is stored or to be stored in an IBM Cloud Object Storage bucket. Required fields may be omitted in field specific objected if allowed and defined in the default remote storage option.
                                          properties:
                                            type:
                                              type: string
                                              enum:
                                                - ibmcloud_cos
                                              default: ibmcloud_cos
                                            region:
                                              type: string
                                              example: us-east
                                              description: Region, Cross-Region, or Single Data Center as defined by IBM Cloud Object Storage (https://cloud.ibm.com/docs/cloud-object-storage?topic=cloud-object-storage-endpoints)
                                              pattern: ^[a-zA-Z-]+$
                                            region_type:
                                              type: string
                                              enum:
                                                - regional
                                                - cross-region
                                                - single-site
                                            bucket_crn:
                                              description: Fully specified <a href="https://cloud.ibm.com/docs/account?topic=account-crn">CRN</a> for the target Cloud Object Storage bucket
                                              type: string
                                              example: crn:v1:bluemix:public:cloud-object-storage:global:a/abc123:abc123:bucket:my-bucket
                                            object_name:
                                              description: Name/ID of the object in the IBM Cloud Object Storage bucket. May *not* be specified in the default remote storage option.
                                              type: string
                                          required:
                                            - object_name
                                            - bucket_crn
                                            - region
                                            - region_type
                                      discriminator:
                                        propertyName: type
                                    - description: Location for where job logs will be stored (omitted properties will will be inherited from default remote storage option)
                                transpiled_circuits:
                                  allOf:
                                    - oneOf:
                                        - type: object
                                          description: Remote storage metadata for where data is stored or to be stored in an IBM Cloud Object Storage bucket. Required fields may be omitted in field specific objected if allowed and defined in the default remote storage option.
                                          properties:
                                            type:
                                              type: string
                                              enum:
                                                - ibmcloud_cos
                                              default: ibmcloud_cos
                                            region:
                                              type: string
                                              example: us-east
                                              description: Region, Cross-Region, or Single Data Center as defined by IBM Cloud Object Storage (https://cloud.ibm.com/docs/cloud-object-storage?topic=cloud-object-storage-endpoints)
                                              pattern: ^[a-zA-Z-]+$
                                            region_type:
                                              type: string
                                              enum:
                                                - regional
                                                - cross-region
                                                - single-site
                                            bucket_crn:
                                              description: Fully specified <a href="https://cloud.ibm.com/docs/account?topic=account-crn">CRN</a> for the target Cloud Object Storage bucket
                                              type: string
                                              example: crn:v1:bluemix:public:cloud-object-storage:global:a/abc123:abc123:bucket:my-bucket
                                            object_name:
                                              description: Name/ID of the object in the IBM Cloud Object Storage bucket. May *not* be specified in the default remote storage option.
                                              type: string
                                          required:
                                            - object_name
                                            - bucket_crn
                                            - region
                                            - region_type
                                      discriminator:
                                        propertyName: type
                                    - description: Location for where job transpiled circuits will be stored. If not provided, transpiled circuits will not be stored.
                              required:
                                - job_params
                                - results
                        session_id:
                          type: string
                          description: Identifier of the session that the job is a part of
                        user_id:
                          type: string
                          description: The id of the user submitted the job
                        usage:
                          title: Usage
                          description: usage metrics
                          type: object
                          properties:
                            seconds:
                              type: number
                              description: Number of seconds of Qiskit Runtime usage including quantum compute and near-time classical pre- and post-processing
                          required:
                            - seconds
                        private:
                          type: boolean
                          description: When set to true, input parameters are not returned, and the results can only be read once. After the job is completed, input parameters are deleted from the service. After the results are read, they are deleted from the service. When set to false, the input parameters and results follow the standard retention behavior of the API. Only returned in the response if the value is true, otherwise it is omitted.
                        estimated_running_time_seconds:
                          type: number
                          format: double
                          description: Estimated usage in seconds
                        calibration_id:
                          type: string
                          description: The ID of the calibration used for the job
                      required:
                        - id
                        - created
                        - program
                        - state
                        - status
                        - cost
                  count:
                    type: integer
                    format: int32
                    minimum: 0
                    maximum: 2147483647
                    description: Total number of jobs for the user
                  offset:
                    type: integer
                    format: int32
                    minimum: 0
                    maximum: 2147483647
                    description: Offset at which paginated results are returned
                  limit:
                    type: integer
                    format: int32
                    minimum: 1
                    maximum: 200
                    description: Maximum number of results returned in the paginated response
                required:
                  - limit
                  - offset
              examples:
                jobsResponseExample:
                  value:
                    jobs:
                      - id: c5dge2d3rn7breq27i9g
                        backend: ibmq_qasm_simulator
                        cost: 0
                        state:
                          status: Completed
                          reason: ''
                        status: Completed
                        params:
                          iterations: 3
                        program:
                          id: myprogram-abcdef12345
                        created: '2021-10-04T13:52:09.456851Z'
                        runtime: ntc-provider-primitives:latest
                        tags:
                          - tag1
                          - tag2
                          - tag3
                          - tag4
                        session_id: c5dge2d3rn7breq27i9g
                        usage:
                          seconds: 1
                        private: true
                        estimated_running_time_seconds: 30.5
                        calibration_id: fez-ac-tls-test
                      - id: c2gfe1m3ln7breq27i6e
                        backend: ibmq_qasm_simulator
                        cost: 0
                        state:
                          status: Completed
                          reason: ''
                        status: Completed
                        params:
                          iterations: 3
                        program:
                          id: myprogram-abcdef12345
                        created: '2021-10-05T13:52:09.456851Z'
                        runtime: ntc-provider-primitives:latest
                        tags:
                          - tag1
                          - tag2
                          - tag3
                          - tag4
                        session_id: c1mre2f3pn9breq18i4g
                        usage:
                          seconds: 1
                    count: 2
                    limit: 2
                    offset: 0
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                description: Error response
                type: object
                properties:
                  trace:
                    type: string
                    description: A request identifier
                  errors:
                    type: array
                    description: A list of errors
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: Error type identifier
                        message:
                          description: Explanation of the problem
                          type: string
                        more_info:
                          description: URL where information about the error can be read in a web browser
                          type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                description: Error response
                type: object
                properties:
                  trace:
                    type: string
                    description: A request identifier
                  errors:
                    type: array
                    description: A list of errors
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: Error type identifier
                        message:
                          description: Explanation of the problem
                          type: string
                        more_info:
                          description: URL where information about the error can be read in a web browser
                          type: string
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                description: Error response
                type: object
                properties:
                  trace:
                    type: string
                    description: A request identifier
                  errors:
                    type: array
                    description: A list of errors
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: Error type identifier
                        message:
                          description: Explanation of the problem
                          type: string
                        more_info:
                          description: URL where information about the error can be read in a web browser
                          type: string
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                description: Error response
                type: object
                properties:
                  trace:
                    type: string
                    description: A request identifier
                  errors:
                    type: array
                    description: A list of errors
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: Error type identifier
                        message:
                          description: Explanation of the problem
                          type: string
                        more_info:
                          description: URL where information about the error can be read in a web browser
                          type: string
      security:
        - IBMCloudAPIKey: []
        - ServiceCRN: []
        - IBMCloudAuth: []
      x-ibm-events:
        events:
          - name: quantum-computing.job.read
      x-ibm-permissions:
        actions:
          - name: quantum-computing.job.read
    parameters:
      - in: header
        name: IBM-API-Version
        required: false
        schema:
          type: string
          default: '2025-05-01'
    post:
      tags:
        - Jobs
      summary: Run a job
      operationId: create_job
      parameters:
        - name: Parent-Job-Id
          in: header
          description: Parent job ID
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Job ID
                  backend:
                    type: string
                    description: Backend selected to run job
                  session_id:
                    type: string
                    description: Id of the session associated with the job
                  private:
                    type: boolean
                    description: When set to true, input parameters are not returned, and the results can only be read once. After the job is completed, input parameters are deleted from the service. After the results are read, they are deleted from the service. When set to false, the input parameters and results follow the standard retention behavior of the API. Only returned in the response if the value is true, otherwise it is omitted.
                  calibration_id:
                    type: string
                    description: The ID of the calibration used for the job
                    pattern: ^.*$
                    minLength: 1
                    maxLength: 100
                description: Response when creating a job
                required:
                  - id
                  - backend
              example:
                id: c5dge2d3rn7breq27i9g
                backend: ibm_backend
                private: true
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                description: Error response
                type: object
                properties:
                  trace:
                    type: string
                    description: A request identifier
                  errors:
                    type: array
                    description: A list of errors
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: Error type identifier
                        message:
                          description: Explanation of the problem
                          type: string
                        more_info:
                          description: URL where information about the error can be read in a web browser
                          type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                description: Error response
                type: object
                properties:
                  trace:
                    type: string
                    description: A request identifier
                  errors:
                    type: array
                    description: A list of errors
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: Error type identifier
                        message:
                          description: Explanation of the problem
                          type: string
                        more_info:
                          description: URL where information about the error can be read in a web browser
                          type: string
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                description: Error response
                type: object
                properties:
                  trace:
                    type: string
                    description: A request identifier
                  errors:
                    type: array
                    description: A list of errors
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: Error type identifier
                        message:
                          description: Explanation of the problem
                          type: string
                        more_info:
                          description: URL where information about the error can be read in a web browser
                          type: string
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                description: Error response
                type: object
                properties:
                  trace:
                    type: string
                    description: A request identifier
                  errors:
                    type: array
                    description: A list of errors
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: Error type identifier
                        message:
                          description: Explanation of the problem
                          type: string
                        more_info:
                          description: URL where information about the error can be read in a web browser
                          type: string
        '409':
          description: Usage exceeds instance limit
          content:
            application/json:
              schema:
                description: Error response
                type: object
                properties:
                  trace:
                    type: string
                    description: A request identifier
                  errors:
                    type: array
                    description: A list of errors
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: Error type identifier
                        message:
                          description: Explanation of the problem
                          type: string
                        more_info:
                          description: URL where information about the error can be read in a web browser
                          type: string
      description: Invoke a Qiskit Runtime primitive. Note the returned job ID.  You will use it to check the job's status and review results. This request is rate limited to 5 jobs per minute per user.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - allOf:
                    - title: ProgramParams
                      type: object
                      description: Parameters used to run a job
                      properties:
                        program_id:
                          type: string
                          description: ID of the program to be executed
                          pattern: ^.*$
                          minLength: 1
                          maxLength: 10000
                        backend:
                          type: string
                          description: Name that identifies the backend on which to run the program.
                          pattern: ^.*$
                          minLength: 1
                          maxLength: 10000
                        runtime:
                          type: string
                          description: Name and tag of the image to use when running a program (IBM Quantum channel users only). Should follow the pattern "name:tag".
                          pattern: ^.*$
                          minLength: 1
                          maxLength: 10000
                        tags:
                          title: Tags
                          description: List of job or program tags
                          type: array
