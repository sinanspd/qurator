                          example: ibmq/open/main
                        user_id:
                          type: string
                          description: User id
                          example: 65f0478ed32a1891af0a8d31
                        accepting_jobs:
                          type: boolean
                          description: true if the session accepts jobs, false otherwise. Only for sessions, null for jobs
                          example: true
                          nullable: true
                        mode:
                          type: string
                          description: 'Workload mode: job, session or batch'
                          example: job
                          enum:
                            - job
                            - session
                            - batch
                        status:
                          type: string
                          description: State for the workload.
                          example: in_progress
                          enum:
                            - completed
                            - canceled
                            - failed
                            - pending
                            - in_progress
                        status_reason:
                          type: string
