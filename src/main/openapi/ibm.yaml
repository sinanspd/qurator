        '200':
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - title: BackendsResponseV2
                    type: object
                    description: Backends Response when `IBM-API-Version >= 2025-01-01`
                    properties:
                      devices:
                        minItems: 1
                        type: array
                        description: A list of backends with their status
                        items:
                          type: object
                          required:
                            - name
                            - status
                            - queue_length
                          properties:
                            name:
                              type: string
                              description: The name of the backend device
                              minLength: 1
                              maxLength: 255
                            status:
                              type: object
                              description: The status of the backend device
                              properties:
                                name:
                                  type: string
                                  description: The status name of the backend device
                                  enum:
                                    - online
                                    - paused
                                    - offline
                                reason:
                                  type: string
                                  description: Optional reason for the status
                              required:
                                - name
                            is_simulator:
                              type: boolean
                              description: Indicates if the device is a simulator
                            qubits:
                              type: integer
                              format: int32
                              minimum: 0
                              maximum: 2147483647
                              nullable: true
                              description: The number of qubits in the device
                            clops:
                              type: object
                              nullable: true
                              description: Details of the CLOPS
                              properties:
                                type:
                                  type: string
                                  enum:
                                    - virtual
                                    - hardware
                                value:
                                  type: integer
                                  format: int32
                                  minimum: 0
                                  maximum: 2147483647
                              required:
                                - type
                                - value
                            processor_type:
                              type: object
                              nullable: true
                              description: Details of the processor type
                              properties:
                                family:
                                  type: string
                                  nullable: true
                                  description: The family of the processor
                                revision:
                                  type: string
                                  nullable: true
                                  description: The revision of the processor
                                segment:
                                  type: string
                                  nullable: true
                                  description: The segment of the processor
                            queue_length:
                              type: integer
                              format: int32
                              minimum: 0
                              maximum: 2147483647
                              description: The number of jobs waiting to be executed
                            performance_metrics:
                              type: object
                              properties:
                                two_q_error_best:
                                  description: 2Q error (best)
                                  allOf:
                                    - type: object
                                      properties:
                                        value:
                                          type: number
                                          example: 0.1
                                        gate:
                                          type: string
                                          example: cx
                                        unit:
                                          type: string
